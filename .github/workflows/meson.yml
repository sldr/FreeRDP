# Meson build CI for FreeRDP.
#
# Compile-checks the (additive) Meson build system alongside CMake. Two presets:
#   * core: minimal dependencies (WinPR + libfreerdp + channels + Sample bins)
#   * full: desktop tier-1 features (X11 client, FFmpeg, ALSA, PulseAudio, FUSE)
# built with both gcc and clang.
name: Meson

on:
  push:
    branches: [meson, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: ${{ matrix.preset }} / ${{ matrix.cc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { preset: core, cc: gcc }
          - { preset: full, cc: gcc }
          - { preset: full, cc: clang }
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -q -y ninja-build pkg-config python3-pip clang
          # Meson >= 1.3 required (meson.build); use a recent release via pipx.
          pipx install 'meson>=1.3'

      - name: Install core dependencies
        run: sudo apt-get install -q -y libssl-dev zlib1g-dev libicu-dev

      - name: Install full-feature dependencies
        if: matrix.preset == 'full'
        run: |
          sudo apt-get install -q -y \
            libx11-dev libxext-dev libxinerama-dev libxcursor-dev libxv-dev \
            libxi-dev libxrender-dev libxrandr-dev libxfixes-dev \
            libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libpulse-dev libasound2-dev libkrb5-dev libcjson-dev libfuse3-dev \
            liburiparser-dev libsystemd-dev libcups2-dev libusb-1.0-0-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev

      - name: Configure (core)
        if: matrix.preset == 'core'
        run: |
          meson setup build \
            -Dwith_x11=disabled -Dwith_wayland=disabled -Dwith_client_sdl=disabled \
            -Dwith_ffmpeg=disabled -Dwith_swscale=false -Dwith_fuse=disabled \
            -Dwith_krb5=disabled -Dwith_winpr_json=disabled \
            -Dwith_alsa=disabled -Dwith_pulse=disabled -Dwith_oss=disabled \
            -Dwith_manpages=false

      - name: Configure (full)
        if: matrix.preset == 'full'
        run: meson setup build -Dwith_x11=enabled

      - name: Compile
        run: meson compile -C build

      # find_package() parity: install the tree, then build a downstream CMake
      # project that consumes it via the Meson-generated *Config.cmake files.
      - name: Install + CMake find_package() consumer test
        if: matrix.preset == 'full' && matrix.cc == 'gcc'
        run: |
          DESTDIR="$PWD/stage" meson install -C build
          PREFIX="$PWD/stage/usr/local"
          echo "Installed CMake package files:"
          find "$PREFIX/lib" -path '*/cmake/*' -name '*.cmake' | sort
          cmake -S meson/tests/cmake-consumer -B consumer-build \
            -DCMAKE_PREFIX_PATH="$PREFIX"
          cmake --build consumer-build

      - name: Show configuration log on failure
        if: failure()
        run: cat build/meson-logs/meson-log.txt

  # Windows MinGW (UCRT64) via MSYS2 — pacman provides gcc + meson + ninja +
  # pkgconf + openssl + zlib, all integrated (no OpenSSL wrap needed). This is
  # the first compile validation of the Windows code paths (winpr Win32 source
  # selection, the wfreerdp GUI client, .rc resource compilation via windres).
  windows-mingw:
    name: mingw / ucrt64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-zlib

      - name: Configure (core)
        run: |
          meson setup build \
            -Dwith_x11=disabled -Dwith_wayland=disabled -Dwith_client_sdl=disabled \
            -Dwith_ffmpeg=disabled -Dwith_swscale=false -Dwith_fuse=disabled \
            -Dwith_krb5=disabled -Dwith_winpr_json=disabled \
            -Dwith_alsa=disabled -Dwith_pulse=disabled -Dwith_oss=disabled \
            -Dwith_manpages=false

      - name: Compile
        run: meson compile -C build

      - name: Show configuration log on failure
        if: failure()
        run: cat build/meson-logs/meson-log.txt

  # Windows MSVC (x64) — the primary Windows toolchain. Dependencies come from
  # vcpkg (preinstalled on the runner, with binary caching); Meson activates the
  # Visual Studio environment via --vsenv and discovers OpenSSL/zlib through the
  # vcpkg pkg-config + CMake config trees.
  windows-msvc:
    name: msvc / x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson + Ninja
        run: pip install meson ninja

      - name: Install pkg-config
        run: choco install --no-progress pkgconfiglite

      - name: Install dependencies (vcpkg)
        shell: cmd
        run: vcpkg install openssl:x64-windows zlib:x64-windows

      # -k0 while MSVC is under active bring-up; drop once green.
      - name: Configure + compile (core)
        shell: pwsh
        run: |
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          meson setup build --vsenv `
            "-Dpkg_config_path=$vcpkg\lib\pkgconfig" `
            "-Dcmake_prefix_path=$vcpkg" `
            -Dwith_x11=disabled -Dwith_wayland=disabled -Dwith_client_sdl=disabled `
            -Dwith_ffmpeg=disabled -Dwith_swscale=false -Dwith_fuse=disabled `
            -Dwith_krb5=disabled -Dwith_winpr_json=disabled `
            -Dwith_alsa=disabled -Dwith_pulse=disabled -Dwith_oss=disabled `
            -Dwith_manpages=false
          meson compile -C build --ninja-args=-k0

      - name: Show configuration log on failure
        if: failure()
        run: Get-Content build/meson-logs/meson-log.txt
